    /* =====================================================================
       AUDIO  (Web Audio API вҖ” no external files)
    ===================================================================== */
    let _ctx = null;
    function getCtx() {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (_ctx.state === 'suspended') _ctx.resume();
      return _ctx;
    }
    function tone(freq, type, dur, delay = 0, vol = 0.28) {
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(ctx.destination);
        const t = ctx.currentTime + delay;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.01);
      } catch(e) {}
    }

        tone(659.25, 'sine', 0.12, 0.10);

      wrong() {

        expl: `${rb('жӯЈи§Ј','гҒӣгҒ„гҒӢгҒ„')}гҒҜгҖҢ${rb('жӯҜе‘Ёз—…','гҒ—гҒ—гӮ…гҒҶгҒігӮҮгҒҶ')}гҒ§${rb('жӯҜ','гҒҜ')}гҒҢгҒ¬гҒ‘гӮӢгҖҚгҒЁгҖҢ${rb('жӯҜ','гҒҜ')}гҒҗгҒҚгҒӢгӮү${rb('иЎҖ','гҒЎ')}гҒҢ${rb('еҮә','гҒ§')}гӮӢгҖҚпјҒгӮҖгҒ—${rb('жӯҜ','гҒҜ')}гҒҢгҒӘгҒҸгҒҰгӮӮ${rb('жӯҜ','гҒҜ')}гҒҝгҒҢгҒҚгҒ—гҒӘгҒ„гҒЁ${rb('жӯҜе‘Ёз—…','гҒ—гҒ—гӮ…гҒҶгҒігӮҮгҒҶ')}гҒ«гҒӘгҒЈгҒЎгӮғгҒҶгӮ“гҒ гҖӮ${rb('и¶…','гҒЎгӮҮгҒҶ')}гҒ“гӮҸгҒ„пјҒ`,
      },
      {
        q: `гӮҖгҒ—${rb('жӯҜ','гҒҜ')}гӮ’гӮҲгҒјгҒҶгҒҷгӮӢгҒҹгӮҒгҒ«гҖҒ${rb('д»–','гҒ»гҒӢ')}гҒ«гҒ§гҒҚгӮӢгҒ“гҒЁгҒҜпјҹ`,
        opts: [
          `${rb('еӨң','гӮҲгӮӢ')}гҒөгҒӢгҒ—гҒҷгӮӢ`,
          `гӮӯгӮ·гғӘгғҲгғјгғ«гӮ¬гғ гӮ’гҒӢгӮҖрҹҳӢ`,
          `${rb('жӯҜ','гҒҜ')}гӮ’гҒҝгҒҢгҒӢгҒӘгҒ„`,
          `${rb('з”ҳ','гҒӮгҒҫ')}гҒ„гӮӮгҒ®гӮ’гҒҹгҒҸгҒ•гӮ“${rb('йЈҹ','гҒҹ')}гҒ№гӮӢ`,
        ],
        correct: 1, type: '4',
        expl: `гӮӯгӮ·гғӘгғҲгғјгғ«гӮ¬гғ гҒҢ${rb('жӯЈи§Ј','гҒӣгҒ„гҒӢгҒ„')}пјҒгӮӯгӮ·гғӘгғҲгғјгғ«гҒҜгӮҖгҒ—${rb('жӯҜ','гҒҜ')}гӮӯгғігҒҢ${rb('йЈҹ','гҒҹ')}гҒ№гҒҰгӮӮ${rb('й…ё','гҒ•гӮ“')}гӮ’${rb('дҪң','гҒӨгҒҸ')}гӮҢгҒӘгҒ„гӮ“гҒ гҖӮгҒ гҒҲгҒҚгӮӮгҒҹгҒҸгҒ•гӮ“${rb('еҮә','гҒ§')}гӮӢгҒӢгӮү${rb('жӯҜ','гҒҜ')}гҒ«${rb('иүҜ','гӮҲ')}гҒ„гӮ“гҒ гӮҲпјҒ`,
      },

    ];

    /* =====================================================================
       STORY DIALOGS
    ===================================================================== */
    const STORY = [
      { who: 'boss', line: 'гҒөгҒҜгҒҜгҒҜпјҒгӮҖгҒ—жӯҜгӮӯгғігҒ®гҒҗгӮ“гҒ гӮ“гҒҢгҖҒгҒҝгӮ“гҒӘгҒ®жӯҜгӮ’ж”»ж’ғгҒҷгӮӢгҒһпјҒ' },
      { who: 'boss', line: 'гҒ©гҒҶгҒӣеӯҗгҒ©гӮӮгҒҹгҒЎгҒҜжӯҜгҒҝгҒҢгҒҚгҒӘгӮ“гҒҰгҒ—гҒӘгҒ„пјҒгӮҖгҒ—жӯҜеӨ©еӣҪгҒ«гҒ—гҒҰгӮ„гӮӢпјҒрҹҳҲ' },
      { who: 'haku', line: 'гҒҫгҒӢгҒӣгҒҰпјҒгҒјгҒҸгғ”гӮ«гҒҸгӮ“гҒҢеӨ§йӯ”зҺӢгӮ’гҒҹгҒҠгҒ—гҒҰгҒҝгҒӣгӮӢпјҒ' },
      { who: 'haku', line: 'гӮҖгҒ—жӯҜгҒ®гҒІгҒҝгҒӨгӮ’жӯЈгҒ—гҒҸзӯ”гҒҲгӮҢгҒ°гҖҒеӨ§йӯ”зҺӢгҒ®HPгҒҢгҒ©гӮ“гҒ©гӮ“жёӣгӮӢгҒһпјҒрҹ’Ә' },
      { who: 'haku', line: '20е•ҸгҒңгӮ“гҒ¶зӯ”гҒҲгҒҰгҖҒеӨ§йӯ”зҺӢгӮ’гӮ„гҒЈгҒӨгҒ‘гӮҲгҒҶпјҒрҹҰ·' },
    ];

    /* =====================================================================
       STYLES (shared tokens)
    ===================================================================== */
    const C = {
      pink:  '#F8A9B8',
      green: '#A0DA36',
      red:   '#CC0000',
      dark:  '#1A1A1A',
      white: '#FFFFFF',
    };

    /* =====================================================================
       APP
    ===================================================================== */
    function App() {
      const [screen,       setScreen]       = useState('story');   // story|quiz|souvenir|challenge
      const [storyStep,    setStoryStep]     = useState(0);
      const [qIdx,         setQIdx]          = useState(0);
      const [score,        setScore]         = useState(0);
      const [combo,        setCombo]         = useState(0);
      const [maxCombo,     setMaxCombo]      = useState(0);
      const [bossHP,       setBossHP]        = useState(100);
      const [answered,     setAnswered]      = useState(false);
      const [selected,     setSelected]      = useState(null);
      const [multiSel,     setMultiSel]      = useState([]);
      const [isCorrect,    setIsCorrect]     = useState(false);
      const [showExpl,     setShowExpl]      = useState(false);
      const [showNext,     setShowNext]      = useState(false);
      const [comboAnim,    setComboAnim]     = useState(false);
      const [bossAngry,    setBossAngry]     = useState(false);
      const [muted,        setMuted]         = useState(false);
      // challenge
      const [cOrder,       setCOrder]        = useState([]);
      const [cIdx,         setCIdx]          = useState(0);
      const [cScore,       setCScore]        = useState(0);
      const [cTime,        setCTime]         = useState(10);
      const [cAnswered,    setCAnswered]     = useState(false);
      const [cSelected,    setCSelected]     = useState(null);
      const [cIsCorrect,   setCIsCorrect]    = useState(false);
      const [cShowExpl,    setCShowExpl]     = useState(false);
      const [cDone,        setCDone]         = useState(false);

      const nextTimerRef      = useRef(null);
      const cTimerRef         = useRef(null);
      const cAdvanceTimerRef  = useRef(null);
      const mutedRef          = useRef(false);

      // keep mutedRef in sync so sound fns captured in closures use latest value
      useEffect(() => { mutedRef.current = muted; }, [muted]);

      const play = useCallback((name) => {
        if (!mutedRef.current && SFX[name]) { try { SFX[name](); } catch(e) {} }
      }, []);

      /* ---------- STORY ---------- */
      const advanceStory = () => {
        play('tap');
        if (storyStep < STORY.length - 1) setStoryStep(s => s + 1);
        else startQuiz();
      };
      const skipStory = () => { play('tap'); startQuiz(); };

      /* ---------- QUIZ START ---------- */
      const startQuiz = () => {
        setQIdx(0); setScore(0); setCombo(0); setMaxCombo(0); setBossHP(100);
        resetQState();
        setScreen('quiz');
      };

      const resetQState = () => {
        setAnswered(false); setSelected(null); setMultiSel([]);
        setIsCorrect(false); setShowExpl(false); setShowNext(false);
        setBossAngry(false);
        if (nextTimerRef.current) clearTimeout(nextTimerRef.current);
      };

      /* ---------- ANSWER HANDLING ---------- */
      const q = QS[qIdx] || QS[0];
      const HP_PER_Q = 100 / QS.length;

      const handleAnswer = (idx) => {
        if (answered) return;
        if (q.type === 'multi') {
          setMultiSel(prev => prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx]);
          return;
        }
        commitAnswer(idx, null);
      };

      const submitMulti = () => {
        if (answered) return;
        commitAnswer(null, multiSel);
      };

      const commitAnswer = (single, multi) => {
        setAnswered(true);
        const isMulti = q.type === 'multi';
        const ok = isMulti
          ? JSON.stringify([...(multi||[])].sort()) === JSON.stringify([...q.correct].sort())
          : single === q.correct;

        setSelected(isMulti ? multi : single);
        setIsCorrect(ok);
        setShowExpl(true);

        if (ok) {
          const nc = combo + 1;
          setScore(s => s + 1);
          setCombo(nc);
          setMaxCombo(m => Math.max(m, nc));
          setBossHP(h => Math.max(0, h - HP_PER_Q));
          play('correct');
          if (nc >= 3) {
            play('combo');
            setComboAnim(true);
            setTimeout(() => setComboAnim(false), 1300);
          }
          setShowNext(true);
        } else {
          setCombo(0);
          setBossAngry(true);
          play('wrong');
          setTimeout(() => setBossAngry(false), 700);
          nextTimerRef.current = setTimeout(() => setShowNext(true), 500);
        }
      };

      const goNext = () => {
        if (nextTimerRef.current) clearTimeout(nextTimerRef.current);
        const next = qIdx + 1;
        if (next >= QS.length) {
          play('fanfare');
          setScreen('souvenir');
        } else {
          setQIdx(next);
          resetQState();
        }
      };

      /* ---------- CHALLENGE ---------- */
      const startChallenge = () => {
        // exclude multi-choice questions
        const pool = QS.map((q, i) => i).filter(i => QS[i].type !== 'multi');
        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        setCOrder(shuffled);
        setCIdx(0); setCScore(0); setCTime(10);
        setCAnswered(false); setCSelected(null); setCIsCorrect(false);
        setCShowExpl(false); setCDone(false);
        setScreen('challenge');
      };

      // Challenge timer
      useEffect(() => {
        if (screen !== 'challenge' || cDone || cAnswered) return;
        if (cTimerRef.current) clearInterval(cTimerRef.current);
        setCTime(10);
        cTimerRef.current = setInterval(() => {
          setCTime(t => {
            if (t <= 1) {
              clearInterval(cTimerRef.current);
              return 0;
            }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(cTimerRef.current);
      }, [screen, cIdx, cDone, cAnswered]);

      // Challenge timeout (time hits 0)
      useEffect(() => {
        if (screen !== 'challenge' || cDone || cAnswered || cTime !== 0) return;
        setCAnswered(true);
        setCIsCorrect(false);
        setCShowExpl(true);
        play('wrong');
        scheduleChallengeAdvance();
      }, [cTime]); // eslint-disable-line

      const handleChallengeAnswer = (idx) => {
        if (cAnswered) return;
        clearInterval(cTimerRef.current);
        const cq = QS[cOrder[cIdx]];
        const ok = idx === cq.correct;
        setCAnswered(true);
        setCSelected(idx);
        setCIsCorrect(ok);
        setCShowExpl(true);
        if (ok) { setCScore(s => s + 1); play('correct'); } else play('wrong');
        scheduleChallengeAdvance();
      };

      const scheduleChallengeAdvance = () => {
        if (cAdvanceTimerRef.current) clearTimeout(cAdvanceTimerRef.current);
        cAdvanceTimerRef.current = setTimeout(() => {
          setCIdx(prev => {
            const next = prev + 1;
            if (next >= cOrder.length) {
              setCDone(true);
              play('fanfare');
              return prev;
            }
            setCAnswered(false);
            setCSelected(null);
            setCIsCorrect(false);
            setCShowExpl(false);
            setCTime(10);
            return next;
          });
        }, 1800);
      };

      /* ---------- RENDER ---------- */
      return (
        <div style={{ fontFamily:"'M PLUS Rounded 1c',sans-serif", minHeight:'100dvh', position:'relative' }}>
          {/* Mute button (always visible) */}
          <button
            onClick={() => setMuted(m => !m)}
            style={{
              position:'fixed', top:12, right:12, zIndex:2000,
              width:44, height:44, borderRadius:'50%',
              background:'rgba(255,255,255,0.88)', border:'2px solid rgba(0,0,0,0.12)',
              fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 2px 10px rgba(0,0,0,0.18)',
            }}
            aria-label={muted ? 'йҹіON' : 'йҹіOFF'}
          >{muted ? 'рҹ”Ү' : 'рҹ”Ҡ'}</button>

          {screen === 'story' && (
            <StoryScreen dialog={STORY[storyStep]} step={storyStep} total={STORY.length}
              onNext={advanceStory} onSkip={skipStory} />
          )}
          {screen === 'quiz' && (
            <QuizScreen
              q={q} qIdx={qIdx} total={QS.length}
              bossHP={bossHP} combo={combo} score={score}
              answered={answered} selected={selected} multiSel={multiSel}
              isCorrect={isCorrect} showExpl={showExpl} showNext={showNext}
              comboAnim={comboAnim} bossAngry={bossAngry}
              onAnswer={handleAnswer} onSubmitMulti={submitMulti} onNext={goNext}
            />
          )}
          {screen === 'souvenir' && (
            <SouvenirScreen score={score} total={QS.length} maxCombo={maxCombo}
              onRetry={() => { setStoryStep(0); setScreen('story'); }}
              onChallenge={startChallenge} />
          )}
          {screen === 'challenge' && (
            <ChallengeScreen
              q={QS[cOrder[cIdx]]} qIdx={cIdx} total={cOrder.length}
              score={cScore} time={cTime}
              answered={cAnswered} selected={cSelected} isCorrect={cIsCorrect}
              showExpl={cShowExpl} done={cDone}
              onAnswer={handleChallengeAnswer}
              onBack={() => setScreen('souvenir')}
            />
          )}
        </div>
      );
    }

    /* =====================================================================
       STORY SCREEN
    ===================================================================== */
    function StoryScreen({ dialog, step, total, onNext, onSkip }) {
      const isBoss = dialog.who === 'boss';
      return (
        <div style={{
          minHeight:'100dvh', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'60px 20px 32px', position:'relative',
          background: isBoss
            ? 'linear-gradient(160deg,#2d0000 0%,#660000 40%,#cc2200 100%)'
            : 'linear-gradient(160deg,#1a3300 0%,#3a6600 40%,#A0DA36 100%)',
        }}>
          {/* Skip */}
          <button onClick={onSkip} style={{
            position:'absolute', top:16, left:16,
            padding:'8px 18px', background:'rgba(255,255,255,0.18)',
            border:'2px solid rgba(255,255,255,0.35)', borderRadius:20,
            fontSize:14, fontFamily:'inherit', cursor:'pointer', color:'#fff', fontWeight:700,
          }}>гӮ№гӮӯгғғгғ— в–¶в–¶</button>

          {/* Character image */}
          <div style={{
            width:'min(80vw, 340px)', height:'min(80vw, 340px)', marginBottom:12,
            animation:'floatY 2.5s ease-in-out infinite',
            filter:'drop-shadow(0 10px 30px rgba(0,0,0,0.4))',
          }}>
            <img
              src={isBoss ? IMG_BOSS : IMG_HAKU}
              alt={isBoss ? 'гӮҖгҒ—жӯҜеӨ§йӯ”зҺӢ' : 'гғ”гӮ«гҒҸгӮ“'}
              style={{ width:'100%', height:'100%', objectFit:'contain' }}
            />
          </div>

          {/* Name tag */}
          <div style={{
            background: isBoss ? C.red : C.green,
            color:'#fff', padding:'5px 20px', borderRadius:20,
            fontWeight:800, fontSize:17, marginBottom:14,
            boxShadow:'0 3px 12px rgba(0,0,0,0.3)',
          }}>
            {isBoss ? 'рҹҳҲ гӮҖгҒ—жӯҜеӨ§йӯ”зҺӢ' : 'рҹҰ· гғ”гӮ«гҒҸгӮ“'}
          </div>

          {/* Dialog box вҖ” tap to advance */}
          <div onClick={onNext} style={{
            background:'rgba(255,255,255,0.94)',
            borderRadius:22, padding:'20px 24px',
            maxWidth:340, width:'100%',
            fontSize:19, fontWeight:700, lineHeight:1.65,
            color: C.dark, textAlign:'center',
            border:`3px solid ${isBoss ? C.red : C.green}`,
            boxShadow:'0 6px 28px rgba(0,0,0,0.22)',
            cursor:'pointer', position:'relative', minHeight:48,
          }}>
            {dialog.line}
            <div style={{
              position:'absolute', bottom:10, right:14,
              fontSize:12, color:'#aaa', fontWeight:400,
            }}>гӮҝгғғгғ—гҒ§ж¬ЎгҒё в–ј</div>
          </div>

          {/* Progress dots */}
          <div style={{ display:'flex', gap:10, marginTop:22 }}>
            {Array.from({length:total}).map((_,i) => (
              <div key={i} style={{
                width:11, height:11, borderRadius:'50%',
                background: i <= step ? '#fff' : 'rgba(255,255,255,0.3)',
                transition:'background 0.3s',
              }}/>
            ))}
          </div>
        </div>
      );
    }

    /* =====================================================================
       QUIZ SCREEN
    ===================================================================== */
    function QuizScreen({
      q, qIdx, total, bossHP, combo, score,
      answered, selected, multiSel, isCorrect,
      showExpl, showNext, comboAnim, bossAngry,
      onAnswer, onSubmitMulti, onNext,
    }) {
      const is2    = q.type === '2';
      const isMulti = q.type === 'multi';
      const hpPct  = Math.round(bossHP);
      const hpClr  = bossHP > 50 ? C.red : bossHP > 25 ? '#FF8C00' : '#FFD700';

      return (
        <div style={{
          minHeight:'100dvh', display:'flex', flexDirection:'column',
          maxWidth:480, margin:'0 auto', padding:'12px 16px 28px',
        }}>
          {/* Header row */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, gap:6 }}>
            <div style={pill('#fff8')}>рҹҸҶ {score} / {total}</div>
            {combo >= 2 && (
              <div style={{...pill('#FF6B35'), color:'#fff', fontSize:14}}>рҹ”Ҙ {combo}гӮігғігғң</div>
            )}
            <div style={pill('#fff8')}>{qIdx + 1} / {total}</div>
          </div>

          {/* Boss HP bar */}
          <div style={{ marginBottom:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
              <img
                src={IMG_BOSS} alt="еӨ§йӯ”зҺӢ"
                style={{
                  width:64, height:64, objectFit:'contain',
                  animation: bossAngry ? 'shake 0.5s ease' : 'none',
                  filter: bossAngry ? 'brightness(1.8) saturate(2)' : 'none',
                }}
              />
              <span style={{ fontWeight:800, fontSize:13, color: C.dark }}>еӨ§йӯ”зҺӢ HP</span>
              <span style={{ fontWeight:800, fontSize:13, color: hpClr, marginLeft:'auto' }}>{hpPct}%</span>
            </div>
            <div style={{
              width:'100%', height:18, background:'rgba(255,255,255,0.45)',
              borderRadius:9, overflow:'hidden', border:'2px solid rgba(0,0,0,0.12)',
            }}>
              <div style={{
                width:`${hpPct}%`, height:'100%',
                background:`linear-gradient(90deg,${hpClr},${hpClr}cc)`,
                borderRadius:9, transition:'width 0.7s ease, background 0.5s ease',
              }}/>
            </div>
          </div>

          {/* гғ”гӮ«гҒҸгӮ“ */}
          <div style={{ display:'flex', justifyContent:'center', marginBottom:2 }}>
            <img src={IMG_HAKU} alt="гғ”гӮ«гҒҸгӮ“" style={{
              width:200, height:200, objectFit:'contain',
              filter:'drop-shadow(0 4px 14px rgba(0,0,0,0.18))',
              animation: isCorrect && answered ? 'floatY 1s ease-in-out' : 'none',
            }}/>
          </div>

          {/* Question box */}
          <div style={{
            background:'rgba(255,255,255,0.93)', borderRadius:20,
            overflow:'hidden', marginBottom:24,
            boxShadow:'0 4px 18px rgba(0,0,0,0.15)',
            border:'4px solid #1A1A1A',
          }}>
            <div style={{
              background:'#1A1A1A', color:'#fff',
              padding:'7px 18px', textAlign:'center',
              fontWeight:800, fontSize:16, letterSpacing:1,
            }}>гӮӮгӮ“гҒ гҒ„ Q{qIdx + 1}</div>
            <div style={{
              padding:'14px 18px',
              fontSize:18, fontWeight:700, lineHeight:1.65, color: C.dark,
              textAlign:'center',
            }}>
              <H t={q.q} />
              {isMulti && <div style={{ fontSize:13, color: C.red, marginTop:5, fontWeight:800 }}>вҖ» 2гҒӨгҒҲгӮүгӮ“гҒ§гҒӯпјҒ</div>}
            </div>
          </div>

          {/* Choices */}
          <div style={{
            display: is2 ? 'grid' : 'flex',
            gridTemplateColumns: is2 ? '1fr 1fr' : undefined,
            flexDirection: is2 ? undefined : 'column',
            gap:10, marginBottom:12,
          }}>
            {q.opts.map((opt, i) => {
              const isSel  = isMulti ? multiSel.includes(i) : selected === i;
              const isAns  = isMulti ? q.correct.includes(i) : i === q.correct;
              let bg = 'rgba(255,255,255,0.9)';
              let bd = '3px solid rgba(255,255,255,0.6)';
              let cl = C.dark;
              if (answered) {
                if (isAns)              { bg = '#c8f05a'; bd = `3px solid ${C.green}`; }
                else if (isSel && !isAns) { bg = '#ffcccc'; bd = `3px solid ${C.red}`; cl = C.red; }
                else                    { bg = 'rgba(255,255,255,0.35)'; cl = '#aaa'; }
              } else if (isSel) {
                bg = C.pink; bd = `3px solid ${C.red}`;
              }
              return (
                <button key={i} onClick={() => onAnswer(i)}
                  disabled={answered && !isMulti}
                  style={{
                    minHeight:52, padding: is2 ? '12px 10px' : '13px 18px',
                    background:bg, border:bd, borderRadius:16,
                    fontSize: is2 ? 16 : 17, fontWeight:700, color:cl,
                    cursor: (answered && !isMulti) ? 'default' : 'pointer',
                    transition:'all 0.2s', fontFamily:'inherit',
                    lineHeight:1.45, textAlign:'center',
                    boxShadow:'0 3px 12px rgba(0,0,0,0.1)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                  <H t={opt} />
                </button>
              );
            })}
          </div>

          {/* Multi submit */}
          {isMulti && !answered && (
            <button onClick={onSubmitMulti} disabled={multiSel.length < 2} style={{
              minHeight:52, padding:'13px 24px',
              background: multiSel.length >= 2 ? C.green : '#ccc',
              border:'none', borderRadius:16,
              fontSize:18, fontWeight:800, color:'#fff',
              cursor: multiSel.length >= 2 ? 'pointer' : 'default',
              fontFamily:'inherit', marginBottom:12,
              boxShadow:'0 4px 14px rgba(0,0,0,0.15)',
            }}>гҒ“гӮҢгҒ§жұәгӮҒгӮӢпјҒвңҠ</button>
          )}

          {/* Explanation */}
          {showExpl && (
            <div style={{
              background: isCorrect ? 'rgba(200,240,90,0.25)' : 'rgba(255,200,200,0.65)',
              border:`3px solid ${isCorrect ? C.green : C.red}`,
              borderRadius:16, padding:'13px 15px', marginBottom:10,
              animation:'fadeUp 0.3s ease',
            }}>
              <div style={{ fontSize:20, fontWeight:800, color: isCorrect ? '#3a7000' : C.red, marginBottom:5 }}>
                {isCorrect ? 'вӯ• гӮ„гҒЈгҒҹгҒӯпјҒжӯЈи§ЈпјҒрҹҺү' : 'вқҢ гҒ–гӮ“гҒӯгӮ“пјҒгғҸгӮәгғ¬пјҒ'}
              </div>

              <div style={{ fontSize:14, lineHeight:1.7, color:'#333', whiteSpace:'pre-line' }}>
                <H t={q.expl} />
              </div>
            </div>
          )}

          {/* Boss reaction when wrong */}
          {showExpl && !isCorrect && (
            <div style={{
              display:'flex', alignItems:'center', gap:10,
              background:'rgba(204,0,0,0.07)', border:'2px dashed #CC0000',
              borderRadius:12, padding:'8px 14px', marginBottom:10,
            }}>
              <img src={IMG_BOSS} alt="еӨ§йӯ”зҺӢ" style={{ width:50, height:50, objectFit:'contain' }}/>
              <span style={{ fontWeight:700, fontSize:14, color: C.red }}>
                гҖҢеҠ©гҒӢгҒЈгҒҹгҖңпјҒгҒөгҒҜгҒҜгҒҜпјҒрҹҳҲгҖҚ
              </span>
            </div>
          )}

          {/* Next button */}
          {showNext && (
            <button onClick={onNext} style={{
              minHeight:58, padding:'14px 24px',
              background:'linear-gradient(135deg,#A0DA36,#7CB82F)',
              border:'none', borderRadius:20,
              fontSize:20, fontWeight:800, color:'#fff',
              cursor:'pointer', fontFamily:'inherit',
              boxShadow:'0 6px 22px rgba(160,218,54,0.45)',
              animation:'fadeUp 0.3s ease',
            }}>
              {qIdx + 1 >= total ? 'рҹҸҶ гҒ‘гҒЈгҒӢгӮ’гҒҝгӮӢпјҒ' : 'гҒӨгҒҺгҒ®е•ҸйЎҢгҒё в–¶'}
            </button>
          )}

          {/* Combo popup overlay */}
          {comboAnim && (
            <div style={{
              position:'fixed', inset:0, zIndex:1500,
              display:'flex', alignItems:'center', justifyContent:'center',
              pointerEvents:'none',
            }}>
              <div style={{
                background:'rgba(255,255,255,0.95)', borderRadius:22,
                padding:'16px 36px',
                fontSize:44, fontWeight:800, color:'#FF6B35',
                textShadow:'0 3px 14px rgba(0,0,0,0.2)',
                animation:'comboPop 0.5s ease',
              }}>рҹ”Ҙ {combo}гӮігғігғңпјҒ</div>
            </div>
          )}
        </div>
      );
    }

    /* =====================================================================
       SOUVENIR SCREEN  (гҒҠгҒҝгӮ„гҒ’)
    ===================================================================== */
    function SouvenirScreen({ score, total, maxCombo, onRetry, onChallenge }) {
      const pct = Math.round((score / total) * 100);
      const badge = pct === 100 ? { txt:'рҹҸҶ гӮҖгҒ—жӯҜгғҸгӮ«гӮ»пјҒ',      bg:'#FFD700', color:'#4a3000' }
                  : pct >= 80  ? { txt:'рҹҘҮ гӮҖгҒ—жӯҜгғһгӮ№гӮҝгғјпјҒ',     bg: C.green,  color:'#fff'    }
                  : pct >= 60  ? { txt:'рҹҘҲ гӮҖгҒ—жӯҜгӮҲгҒјгҒҶеЈ«',       bg:'#64B5F6', color:'#fff'    }
                  :              { txt:'рҹҘү гӮҖгҒ—жӯҜгҒ‘гӮ“гҒҚгӮ…гҒҶгҒЎгӮ…гҒҶ',bg: C.pink,   color: C.dark   };
      return (
        <div style={{
          minHeight:'100dvh', display:'flex', flexDirection:'column',
          alignItems:'center', padding:'32px 20px 40px',
          maxWidth:480, margin:'0 auto',
        }}>
          {/* Boss defeated message */}
          <div style={{ marginBottom:6, textAlign:'center' }}>
            <img src={IMG_BOSS} alt="еӨ§йӯ”зҺӢ" style={{
              width:300, height:300, objectFit:'contain',
              filter:'grayscale(0.6) brightness(0.7)',
              opacity:0.6,
            }}/>
            <div style={{ fontSize:13, color:'#888', fontWeight:700, marginTop:2 }}>еӨ§йӯ”зҺӢ HP {Math.max(0, 100 - score * 5)}%вҖҰ</div>
          </div>

          <img src={IMG_HAKU} alt="гғ”гӮ«гҒҸгӮ“" style={{
            width:'min(90vw, 60dvh)', height:'min(90vw, 60dvh)', objectFit:'contain', marginBottom:12,
            filter:'drop-shadow(0 8px 26px rgba(0,0,0,0.22))',
            animation:'floatY 2.5s ease-in-out infinite',
          }}/>

          <h1 style={{
            fontSize:30, fontWeight:800, color: C.dark, textAlign:'center',
            marginBottom:16, textShadow:'2px 3px 0 rgba(255,255,255,0.7)',
          }}>
            {score === total ? 'рҹҺү гҒңгӮ“гӮӮгӮ“ гҒӣгҒ„гҒӢгҒ„пјҒ' : 'рҹҺү гӮҜгӮӨгӮә гҒҠгӮҸгҒЈгҒҹгӮҲпјҒ'}
          </h1>

          {/* White result card */}
          <div style={{
            background:'#FFFFFF', borderRadius:26,
            padding:'24px 28px', width:'100%',
            boxShadow:'0 10px 40px rgba(0,0,0,0.14)', marginBottom:20,
          }}>
            {/* Score */}
            <div style={{ textAlign:'center', marginBottom:18 }}>
              <div style={{ fontSize:13, color:'#aaa', marginBottom:2 }}>гӮ№гӮігӮў</div>
              <div style={{ fontSize:58, fontWeight:800, color: C.dark, lineHeight:1 }}>
                {score}<span style={{ fontSize:26, color:'#888' }}> / {total}</span>
              </div>
              <div style={{ fontSize:28, fontWeight:800, color: C.green, marginTop:2 }}>{pct}%</div>
            </div>

            {/* Badge */}
            <div style={{
              background:badge.bg, color:badge.color,
              borderRadius:16, padding:'12px 20px', textAlign:'center',
              fontWeight:800, fontSize:20, marginBottom:14,
              boxShadow:'0 4px 14px rgba(0,0,0,0.18)',
            }}>{badge.txt}</div>

            {/* Max combo */}
            {maxCombo >= 3 && (
              <div style={{ textAlign:'center', fontSize:16, color:'#FF6B35', fontWeight:700, marginBottom:12 }}>
                рҹ”Ҙ гҒ•гҒ„гҒ“гҒҶгӮігғігғңпјҡ{maxCombo}гӮігғігғңпјҒ
              </div>
            )}

            {/* Show to parents */}
            <div style={{
              background:'#FFF9C4', borderRadius:14,
              padding:'13px 16px', textAlign:'center',
              fontSize:16, fontWeight:800, color: C.dark,
              border:'2px dashed #FFD700',
            }}>рҹ“Ј гҒҠгҒҶгҒЎгҒ®дәәгҒ«иҰӢгҒӣгҒҰгҒӯпјҒ</div>
          </div>

          {/* Buttons */}
          <div style={{ display:'flex', flexDirection:'column', gap:12, width:'100%' }}>
            <button onClick={onChallenge} style={{
              minHeight:58, padding:'14px 24px',
              background:`linear-gradient(135deg,${C.red},#ff4444)`,
              border:'none', borderRadius:20,
              fontSize:20, fontWeight:800, color:'#fff',
              cursor:'pointer', fontFamily:'inherit',
              boxShadow:`0 6px 22px rgba(204,0,0,0.4)`,
              lineHeight:1.3,
            }}>
              вҡЎ гғҒгғЈгғ¬гғігӮёгғўгғјгғүпјҒ
              <div style={{ fontSize:13, fontWeight:400, opacity:0.9, marginTop:2 }}>10гҒігӮҮгҒҶгӮҝгӮӨгғ гӮўгӮҝгғғгӮҜ</div>
            </button>
            <button onClick={onRetry} style={{
              minHeight:52, padding:'12px 24px',
              background:'rgba(255,255,255,0.82)',
              border:'3px solid rgba(255,255,255,0.6)', borderRadius:20,
              fontSize:18, fontWeight:700, color: C.dark,
              cursor:'pointer', fontFamily:'inherit',
            }}>рҹ”„ гӮӮгҒҶдёҖеәҰгҒӮгҒқгҒ¶</button>
          </div>
        </div>
      );
    }

    /* =====================================================================
       CHALLENGE SCREEN
    ===================================================================== */
    function ChallengeScreen({ q, qIdx, total, score, time, answered, selected, isCorrect, showExpl, done, onAnswer, onBack }) {
      if (done || !q) {
        const pct = Math.round((score / total) * 100);
        const msg = pct === 100 ? 'гҒӢгӮ“гҒәгҒҚпјҒпјҒрҹҸҶ' : pct >= 80 ? 'гҒҷгҒ”гҒ„пјҒрҹҘҮ' : pct >= 60 ? 'гӮҲгҒҸгҒҢгӮ“гҒ°гҒЈгҒҹпјҒрҹҘҲ' : 'гӮӮгҒҶдёҖеәҰгғҒгғЈгғ¬гғігӮёпјҒрҹ’Ә';
        return (
          <div style={{
            minHeight:'100dvh', display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center',
            padding:'32px 20px', maxWidth:480, margin:'0 auto',
          }}>
            <div style={{ fontSize:64, marginBottom:12 }}>вҡЎ</div>
            <h2 style={{ fontSize:28, fontWeight:800, marginBottom:16, color: C.dark, textAlign:'center' }}>гғҒгғЈгғ¬гғігӮёе®ҢдәҶпјҒ</h2>
            <div style={{
              background:'#fff', borderRadius:26, padding:'28px 36px',
              textAlign:'center', marginBottom:24, width:'100%',
              boxShadow:'0 10px 40px rgba(0,0,0,0.14)',
            }}>
              <div style={{ fontSize:52, fontWeight:800, color: C.red }}>{score}</div>
              <div style={{ fontSize:20, color:'#888' }}>/ {total} гӮӮгӮ“ гҒӣгҒ„гҒӢгҒ„</div>
              <div style={{ fontSize:26, fontWeight:800, color: C.green, marginTop:6 }}>{pct}%</div>
              <div style={{ fontSize:18, fontWeight:700, marginTop:8, color: C.dark }}>{msg}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:12, width:'100%' }}>
              <button onClick={onBack} style={{
                minHeight:58, padding:'14px 24px',
                background:`linear-gradient(135deg,${C.green},#7CB82F)`,
                border:'none', borderRadius:20,
                fontSize:20, fontWeight:800, color:'#fff',
                cursor:'pointer', fontFamily:'inherit',
                boxShadow:'0 6px 22px rgba(160,218,54,0.45)',
              }}>рҹҸ  гҒ‘гҒЈгҒӢгҒ«жҲ»гӮӢ</button>
            </div>
          </div>
        );
      }

      const is2   = q.type === '2';
      const timeCl = time <= 3 ? C.red : time <= 6 ? '#FF8C00' : C.dark;

      return (
        <div style={{
          minHeight:'100dvh', display:'flex', flexDirection:'column',
          maxWidth:480, margin:'0 auto', padding:'12px 16px 28px',
        }}>
          {/* Header */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, gap:6 }}>
            <div style={pill('#fff8')}>вҡЎ {score} / {total}</div>
            <div style={{
              ...pill(time <= 3 ? C.red : '#fff8'),
              color: time <= 3 ? '#fff' : timeCl,
              fontSize:22, fontWeight:800, minWidth:72, textAlign:'center',
              animation: time <= 3 ? 'timerPulse 0.8s ease-in-out infinite' : 'none',
              transition:'all 0.3s',
            }}>вҸұ {time}</div>
          </div>

          {/* Timer bar */}
          <div style={{
            width:'100%', height:10, background:'rgba(255,255,255,0.4)',
            borderRadius:5, overflow:'hidden', marginBottom:14, border:'1px solid rgba(0,0,0,0.1)',
          }}>
            <div style={{
              width:`${(time / 10) * 100}%`, height:'100%',
              background: time <= 3 ? C.red : C.green,
              borderRadius:5, transition:'width 1s linear, background 0.3s',
            }}/>
          </div>

          {/* Q label */}
          <div style={{
            background:'rgba(255,255,255,0.93)', borderRadius:20,
            padding:'14px 18px', marginBottom:14,
            fontSize:17, fontWeight:700, lineHeight:1.65, color: C.dark,
            textAlign:'center', boxShadow:'0 4px 18px rgba(0,0,0,0.1)',
            border:`3px solid rgba(204,0,0,0.3)`,
          }}>
            <div style={{ fontSize:12, color: C.red, marginBottom:3, fontWeight:800 }}>вҡЎ гғҒгғЈгғ¬гғігӮё Q{qIdx + 1}</div>
            <H t={q.q} />
          </div>

          {/* Choices */}
          <div style={{
            display: is2 ? 'grid' : 'flex',
            gridTemplateColumns: is2 ? '1fr 1fr' : undefined,
            flexDirection: is2 ? undefined : 'column',
            gap:10, marginBottom:12,
          }}>
            {q.opts.map((opt, i) => {
              let bg = 'rgba(255,255,255,0.9)';
              let bd = '3px solid rgba(255,255,255,0.6)';
              if (answered) {
                if (i === q.correct)          { bg = '#c8f05a'; bd = `3px solid ${C.green}`; }
                else if (selected === i)      { bg = '#ffcccc'; bd = `3px solid ${C.red}`; }
                else                          { bg = 'rgba(255,255,255,0.35)'; }
              }
              return (
                <button key={i} onClick={() => onAnswer(i)} disabled={answered} style={{
                  minHeight:52, padding: is2 ? '12px 10px' : '13px 18px',
                  background:bg, border:bd, borderRadius:16,
                  fontSize: is2 ? 16 : 17, fontWeight:700, color: C.dark,
                  cursor: answered ? 'default' : 'pointer',
                  transition:'all 0.2s', fontFamily:'inherit',
                  lineHeight:1.45, textAlign:'center',
                  boxShadow:'0 3px 12px rgba(0,0,0,0.1)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}>
                  <H t={opt} />
                </button>
              );
            })}
          </div>

          {showExpl && (
            <div style={{
              background: isCorrect ? 'rgba(200,240,90,0.25)' : 'rgba(255,200,200,0.65)',
              border:`3px solid ${isCorrect ? C.green : C.red}`,
              borderRadius:16, padding:'12px 14px', animation:'fadeUp 0.3s ease',
            }}>
              <div style={{ fontSize:18, fontWeight:800, color: isCorrect ? '#3a7000' : C.red }}>
                {isCorrect ? 'вӯ• жӯЈи§ЈпјҒрҹҺү' : time === 0 ? 'вҸұ жҷӮй–“еҲҮгӮҢпјҒ' : 'вқҢ гғҸгӮәгғ¬пјҒ'}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* =====================================================================
       SHARED STYLE HELPERS
    ===================================================================== */
    function pill(bg) {
      return {
        background:bg, borderRadius:20, padding:'5px 14px',
        fontWeight:800, fontSize:15, color: C.dark,
        boxShadow:'0 2px 8px rgba(0,0,0,0.1)',
        whiteSpace:'nowrap',
      };
    }

    /* =====================================================================
       MOUNT
    ===================================================================== */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
